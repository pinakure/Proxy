# --------------------------------------------------------------------
# ai-cpanel
# --------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name ai-cpanel.iskarion.ddns.net;
    ssl_certificate /etc/letsencrypt/live/ai-cpanel.iskarion.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-cpanel.iskarion.ddns.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /media/ {
        alias /media/ai/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location / {
        proxy_pass http://ollama-webui:8080;
        
        # AGREGAR ESTO: Soporte WebSocket vital para SocketIO en Open WebUI
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host ai-cpanel.iskarion.ddns.net;
        proxy_redirect off;

        # AGREGAR ESTO: Evita que Nginx corte la conexión en respuestas muy largas de la IA
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
