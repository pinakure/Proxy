# --------------------------------------------------------------------
# cerebelus
# --------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name cerebelus.iskarion.ddns.net;
    ssl_certificate /etc/letsencrypt/live/cerebelus.iskarion.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cerebelus.iskarion.ddns.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    include error.conf;

    location /static/ {
        alias /static/cerebelus/;
    }
    
    location /media/ {
        alias /media/cerebelus/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    
    location / {
        proxy_pass http://cerebelus-service:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host cerebelus.iskarion.ddns.net;
        proxy_redirect off;
    }
}
