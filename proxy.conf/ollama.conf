# --------------------------------------------------------------------
# ollama
# --------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name ollama.iskarion.ddns.net;
    ssl_certificate /etc/letsencrypt/live/ollama.iskarion.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ollama.iskarion.ddns.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    location / {

        # 1. Handle CORS Preflight (OPTIONS) requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://adam.iskarion.ddns.net' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Hide duplicate headers coming from the upstream Ollama container
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';

        # 2. Add CORS headers to the actual API responses (GET, POST, etc.)
        add_header 'Access-Control-Allow-Origin' 'https://adam.iskarion.ddns.net' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;


        proxy_pass http://ollama-service:11434;

         # Soporte WebSocket vital para SocketIO
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host ollama.iskarion.ddns.net;
        proxy_redirect off;

        # Evita cortes en streams largos de IA
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;        
    }
}
