# M4G Tracker
    server {
        listen 443 ssl;
        server_name m4gtracker.ddns.net;

        ssl_certificate /etc/letsencrypt/live/m4gtracker.ddns.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/m4gtracker.ddns.net/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        include error.conf;

        # Archivos estáticos de Django
        location /static/ {
            alias /static/m4gtracker/;
        }

        # Archivos multimedia de Django
        location /media/ {
            alias /media/m4gtracker/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Proxy inverso para solicitudes dinámicas conectando con tu upstream
        location / {
            proxy_pass http://m4gtracker-service:8000;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme; # Crítico para que Django sepa que usa HTTPS
            proxy_set_header Host m4gtracker.ddns.net;
            proxy_redirect off;
        }
    }
