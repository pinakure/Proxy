            alias /media/trickynoid/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Enrutamiento para solicitudes principales
        location / {
            proxy_pass http://trickynoid-back-service:8000/;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host api.trickynoid.iskarion.ddns.net;
            proxy_redirect off;
        }
    }
