    }
    #
    # -------------------------------------------
    # Melodify
    # -------------------------------------------
    #
    server {
        listen 443 ssl;
        server_name melodify.ddns.net;

        # Rutas a tus certificados SSL generados por Certbot
        ssl_certificate /etc/letsencrypt/live/melodify.ddns.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/melodify.ddns.net/privkey.pem;

        # Configuraciones de seguridad SSL recomendadas
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Archivos estáticos de Django
        location /static/ {
            alias /static/melodify/;
        }

        # Archivos multimedia de Django
        location /media/ {
            alias /media/melodify/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # Proxy inverso para solicitudes dinámicas conectando con tu upstream
        location / {
            proxy_pass http://melodify-service:8000;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme; # Crítico para que Django sepa que usa HTTPS
            proxy_set_header Host melodify.ddns.net;
            proxy_redirect off;
        }
