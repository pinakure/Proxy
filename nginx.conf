

events { worker_connections 1024; }

http {

    # MIME Types (needed for js and css files to be accepted by strict browsers)
    # Esta línea asocia las extensiones (.css, .js) con su Content-Type correcto
    include       mime.types;
    
    # Define el tipo por defecto si no se reconoce la extensión
    default_type  application/octet-stream;

    # Django Upstreams
    #upstream melodify-upstream {
    #    server melodify-service:8000;
    #}
    #upstream m4gtracker-upstream {
    #    server m4gtracker-service:8000;
    #}

    # HTTP Certbot Route && HTTPS Redirect
    server {
        listen 80;

        # Ruta obligatoria para la validación de Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Envía todo el tráfico web al puerto seguro 443
        location / {
            return 301 https://$host$request_uri;
        }
    }
    #
    # -------------------------------------------
    # Database Admin
    # -------------------------------------------
    server {
        listen 443 ssl;
        server_name db.iskarion.ddns.net; 

	# Rutas a tus certificados SSL generados por Certbot
        ssl_certificate /etc/letsencrypt/live/db.iskarion.ddns.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/db.iskarion.ddns.net/privkey.pem;

        # Configuraciones de seguridad SSL recomendadas
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Proxy inverso para solicitudes dinámicas conectando con tu upstream
        location / {
            proxy_pass http://pgadmin-service:8080;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host db.iskarion.ddns.net;
            proxy_redirect off;
        }
    }
